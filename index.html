<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e1a2b">
<title>Camp Bend the Knee Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    position:fixed; inset:0; overflow:hidden; background:#0e1a2b;
    touch-action:none; user-select:none; -webkit-user-select:none;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color:#fff;
  }
  .hidden { display:none !important; }
  #c { position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- HUD ---------- */
  #hud {
    position:absolute; top:calc(10px + env(safe-area-inset-top)); left:0; right:0;
    display:flex; justify-content:center; pointer-events:none; z-index:5;
  }
  #pips {
    display:flex; gap:8px; background:rgba(10,20,40,.55); padding:8px 16px;
    border-radius:999px; font-size:26px; backdrop-filter:blur(4px);
  }
  .pip { filter:grayscale(1); opacity:.35; transition:all .15s; }
  .pip.on { filter:none; opacity:1; animation:pipPop .35s; }
  @keyframes pipPop { 40% { transform:scale(1.6) rotate(-12deg); } }

  /* ---------- Banner messages ---------- */
  #banner {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:10px;
    align-items:center; justify-content:center; text-align:center;
    pointer-events:none; z-index:20; padding:0 24px;
  }
  #bannerText {
    font-size:clamp(30px, 9vw, 56px); font-weight:900; letter-spacing:-.5px;
    text-shadow:0 4px 0 rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.4);
    animation:bannerIn .45s cubic-bezier(.2,1.6,.4,1);
  }
  #bannerSub {
    font-size:clamp(15px, 4.5vw, 22px); font-weight:700; opacity:.9;
    text-shadow:0 2px 8px rgba(0,0,0,.5); animation:bannerIn .55s cubic-bezier(.2,1.6,.4,1);
  }
  @keyframes bannerIn { from { transform:scale(.3) rotate(-6deg); opacity:0; } }

  /* ---------- Welcome ---------- */
  #welcome {
    position:absolute; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:space-evenly; text-align:center;
    background:linear-gradient(180deg, rgba(8,14,30,.35) 0%, rgba(8,14,30,.65) 100%);
    padding:calc(20px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom));
  }
  .wEmoji { font-size:clamp(34px, 10vw, 56px); animation:bob 2.2s ease-in-out infinite; }
  @keyframes bob { 50% { transform:translateY(-10px) rotate(3deg); } }
  #welcome h1 {
    font-size:clamp(40px, 12vw, 84px); font-weight:900; line-height:.95;
    letter-spacing:-1px; transform:rotate(-3deg);
    text-shadow:0 5px 0 #c0392b, 0 9px 0 rgba(0,0,0,.35), 0 18px 40px rgba(0,0,0,.5);
  }
  #welcome h1 span {
    display:inline-block; font-size:.45em; letter-spacing:8px; margin-top:6px;
    color:#ffd166; text-shadow:0 3px 0 rgba(0,0,0,.4);
  }
  .wTag {
    margin-top:14px; font-size:clamp(13px, 3.6vw, 17px); font-weight:700;
    color:#ffd166; text-shadow:0 2px 6px rgba(0,0,0,.6); letter-spacing:1px;
  }
  .wStart {
    font-size:clamp(20px, 6vw, 30px); font-weight:900; letter-spacing:3px;
    padding:16px 34px; border:4px solid #fff; border-radius:999px;
    background:rgba(255,255,255,.12); animation:pulse 1.1s ease-in-out infinite;
    text-shadow:0 2px 6px rgba(0,0,0,.5); box-shadow:0 8px 30px rgba(0,0,0,.35);
  }
  @keyframes pulse { 50% { transform:scale(1.07); background:rgba(255,255,255,.22); } }

  /* ---------- Chug screen ---------- */
  #chug {
    position:absolute; inset:0; z-index:10; overflow:hidden;
    background:
      radial-gradient(circle at 50% 78%, rgba(255,220,120,.35) 0%, rgba(255,220,120,0) 45%),
      linear-gradient(180deg, #1a0533 0%, #6b2d8b 38%, #ff5e62 78%, #ffb347 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    padding:calc(14px + env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
  }
  #chugTimer {
    flex-shrink:0;
    font-size:clamp(44px, 14vw, 76px); font-weight:900;
    font-variant-numeric:tabular-nums; letter-spacing:1px;
    text-shadow:0 4px 0 rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
  }
  #canWrap {
    flex:1; display:flex; align-items:center; justify-content:center;
    width:100%; min-height:0; transition:transform .07s;
  }
  #canWrap.squish { transform:scale(.955) rotate(-1deg); }
  #canWrap svg {
    /* width-driven sizing: Safari mangles %-heights inside flex items */
    width:min(80vw, 380px); height:auto;
    max-height:48vh; max-height:50svh;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,.4)); transform-origin:50% 88%;
  }
  #paceLine { flex-shrink:0; font-size:15px; font-weight:800; letter-spacing:1px; opacity:.95; text-shadow:0 2px 6px rgba(0,0,0,.4); }
  @keyframes chugShake {
    25% { transform:translate(-7px, 3px) rotate(-.5deg); }
    50% { transform:translate(6px, -4px) rotate(.5deg); }
    75% { transform:translate(-4px, 2px); }
  }
  #chug.shake { animation:chugShake .18s linear; }
  #chugHint {
    flex-shrink:0;
    font-size:clamp(18px, 5.5vw, 26px); font-weight:900; letter-spacing:4px;
    animation:pulse 0.55s ease-in-out infinite; text-shadow:0 2px 8px rgba(0,0,0,.5);
  }
  .bubble { animation:bubbleUp 2.1s linear infinite; }
  .bubble.b2 { animation-duration:2.8s; animation-delay:.6s; }
  .bubble.b3 { animation-duration:1.7s; animation-delay:1.1s; }
  @keyframes bubbleUp { from { transform:translateY(0); opacity:0; } 15% { opacity:.85; } to { transform:translateY(-190px); opacity:0; } }

  /* ---------- Result ---------- */
  #result {
    position:absolute; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
    background:rgba(5,8,20,.55); backdrop-filter:blur(3px);
    padding:calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
            calc(16px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
  }
  #resultCard {
    width:min(430px, 100%); text-align:center; border-radius:26px; padding:26px 22px 24px;
    background:linear-gradient(160deg, #ffb347 0%, #ff5e62 55%, #a53fbf 130%);
    border:5px solid #fff; box-shadow:0 24px 70px rgba(0,0,0,.55);
    animation:cardIn .5s cubic-bezier(.2,1.5,.4,1);
  }
  @keyframes cardIn { from { transform:scale(.4) rotate(5deg); opacity:0; } }
  .rEmoji { font-size:40px; }
  .rTitle {
    font-size:clamp(30px, 9vw, 44px); font-weight:900; letter-spacing:1px;
    text-shadow:0 3px 0 rgba(0,0,0,.28);
  }
  #rTime {
    font-size:clamp(58px, 18vw, 86px); font-weight:900; line-height:1.05;
    font-variant-numeric:tabular-nums; text-shadow:0 5px 0 rgba(0,0,0,.25), 0 14px 30px rgba(0,0,0,.3);
  }
  #rRecordLine { font-size:17px; font-weight:700; opacity:.95; margin-top:4px; min-height:22px; }
  #rNew {
    margin:10px auto 0; display:inline-block; font-size:17px; font-weight:900;
    background:#ffd166; color:#5b2a00; padding:7px 16px; border-radius:999px;
    animation:pulse 0.9s ease-in-out infinite; box-shadow:0 4px 14px rgba(0,0,0,.3);
  }
  .rTag { margin-top:14px; font-size:13px; font-weight:700; letter-spacing:2px; opacity:.85; text-transform:uppercase; }
  #btnRetry {
    margin-top:16px; width:100%; padding:16px; font-size:22px; font-weight:900;
    letter-spacing:2px; border:none; border-radius:16px; background:#fff; color:#c0392b;
    box-shadow:0 6px 0 rgba(0,0,0,.25); cursor:pointer; font-family:inherit;
  }
  #btnRetry:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.25); }

  /* ---------- FX layer (DOM particles) ---------- */
  #fx { position:absolute; inset:0; z-index:50; pointer-events:none; overflow:hidden; }
  .floaty {
    position:absolute; font-size:26px; font-weight:900; white-space:nowrap;
    text-shadow:0 2px 0 rgba(0,0,0,.4); animation:floatUp .7s ease-out forwards;
    transform:translate(-50%,-50%);
  }
  @keyframes floatUp {
    from { opacity:1; transform:translate(-50%,-50%) scale(.6); }
    30%  { opacity:1; transform:translate(-50%,-90%) scale(1.35); }
    to   { opacity:0; transform:translate(-50%,-160%) scale(1.1) rotate(6deg); }
  }
  .pemoji { position:absolute; font-size:30px; will-change:transform, opacity; left:0; top:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud" class="hidden"><div id="pips"></div></div>

<div id="banner" class="hidden">
  <div id="bannerText"></div>
  <div id="bannerSub"></div>
</div>

<div id="welcome">
  <div class="wEmoji">🍺👑🎪</div>
  <div>
    <h1>CAMP<br>BEND THE<br>KNEE<br><span>GAME</span></h1>
    <div class="wTag">ROSKILDE FESTIVAL · OFFICIAL CAMP SPORT</div>
  </div>
  <div class="wStart">TAP TO START</div>
</div>

<div id="chug" class="hidden">
  <div id="chugTimer">0.00</div>
  <div id="paceLine"></div>
  <div id="canWrap">
    <svg viewBox="0 0 220 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffe066"/>
          <stop offset="1" stop-color="#ffb400"/>
        </linearGradient>
        <clipPath id="canClip">
          <path d="M47,58 L47,326 Q47,340 68,344 L152,344 Q173,340 173,326 L173,58 Z"/>

      </defs>
      <!-- fluid (clipped to can) -->
      <g clip-path="url(#canClip)">
        <rect id="fluid" x="40" y="80" width="140" height="280" fill="url(#gold)"/>
        <ellipse id="foam" cx="110" cy="80" rx="70" ry="10" fill="#fff8e7" opacity=".95"/>
        <circle class="bubble"    cx="85"  cy="330" r="5" fill="#fff" opacity=".6"/>
        <circle class="bubble b2" cx="118" cy="335" r="7" fill="#fff" opacity=".5"/>
        <circle class="bubble b3" cx="142" cy="332" r="4" fill="#fff" opacity=".6"/>
        <g id="ghost" opacity="0">
          <line id="ghostLine" x1="47" y1="72" x2="173" y2="72" stroke="#fff" stroke-width="3" stroke-dasharray="9 6" opacity=".75"/>
          <text id="ghostTxt" x="168" y="65" text-anchor="end" font-family="system-ui, Arial" font-size="15" font-weight="900" fill="#fff" opacity=".9">REC 🏆</text>
        </g>
      </g>
      <!-- label (over fluid) -->
      <g opacity=".9" pointer-events="none">
        <text x="110" y="175" text-anchor="middle" font-family="system-ui, Arial" font-size="24" font-weight="900" fill="#fff">CAMP</text>
        <text x="110" y="202" text-anchor="middle" font-family="system-ui, Arial" font-size="21" font-weight="900" fill="#fff">BEND THE</text>
        <text x="110" y="229" text-anchor="middle" font-family="system-ui, Arial" font-size="24" font-weight="900" fill="#fff">KNEE</text>
        <text x="110" y="252" text-anchor="middle" font-family="system-ui, Arial" font-size="11" font-weight="700" fill="#fff" opacity=".8">FESTIVAL PILSNER · 4.6%</text>
      </g>
      <!-- can outline -->
      <path d="M47,58 L47,326 Q47,340 68,344 L152,344 Q173,340 173,326 L173,58 Z"
            fill="rgba(255,255,255,.07)" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
      <!-- top lid -->
      <ellipse cx="110" cy="58" rx="63" ry="14" fill="#e8edf2" stroke="#fff" stroke-width="6"/>
      <ellipse cx="110" cy="58" rx="44" ry="9" fill="#cfd8e0"/>
      <!-- pull tab -->
      <ellipse cx="110" cy="56" rx="11" ry="5.5" fill="none" stroke="#8895a3" stroke-width="4"/>
      <rect x="106" y="46" width="8" height="12" rx="3" fill="#8895a3"/>
    </svg>
  </div>
  <div id="chugHint">TAP! TAP! TAP!</div>
</div>

<div id="result" class="hidden">
  <div id="resultCard">
    <div class="rEmoji">🍻🎉🍻</div>
    <div class="rTitle">KNEE BENT!</div>
    <div id="rTime">0.00s</div>
    <div id="rRecordLine"></div>
    <div id="rNew" class="hidden">🏆 NEW CAMP RECORD 🏆</div>
    <div class="rTag">Camp Bend the Knee · Roskilde 2026</div>
    <button id="btnRetry">TRY AGAIN 🍺</button>
  </div>
</div>

<div id="fx"></div>

<script src="lib/three.min.js"></script>
<script>
'use strict';
/* ================================================================
   Camp Bend the Knee Game — single-file three.js browser game
   Phase 1: whack-a-mole beer delivery · Phase 2: chug race
   ================================================================ */

/* ---------------- helpers ---------------- */
const $ = id => document.getElementById(id);
const rand = (a, b) => a + Math.random() * (b - a);
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

/* ---------------- audio (Web Audio SFX + music) ---------------- */
let actx = null, _noiseBuf = null;
const music = new Audio(encodeURI('assets/Camp Bend the Knee.mp3'));
music.loop = true;
music.preload = 'auto';

function audioInit() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  // unlock the <audio> element for iOS (must start inside a user gesture)
  music.play().then(() => { music.pause(); music.currentTime = 0; }).catch(() => {});
}
function noiseBuffer() {
  if (_noiseBuf) return _noiseBuf;
  const len = Math.floor(actx.sampleRate * 0.3);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return (_noiseBuf = buf);
}
function adsr(g, t, peak, dur) {
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(peak, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
}
function tone(type, f0, f1, dur, peak, when = 0) {
  if (!actx) return;
  const t = actx.currentTime + when;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  adsr(g, t, peak, dur);
  o.connect(g).connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function noiseHit(filterType, freq, dur, peak, when = 0) {
  if (!actx) return;
  const t = actx.currentTime + when;
  const n = actx.createBufferSource(); n.buffer = noiseBuffer();
  const f = actx.createBiquadFilter(); f.type = filterType; f.frequency.value = freq;
  const g = actx.createGain(); adsr(g, t, peak, dur);
  n.connect(f).connect(g).connect(actx.destination);
  n.start(t); n.stop(t + dur + 0.05);
}
// The satisfying THUD when a can smacks a camp member
function sfxThud() {
  tone('sine', 165, 36, 0.20, 0.95);          // deep body drop
  noiseHit('lowpass', 650, 0.09, 0.55);       // knock
}
function sfxThrow() { noiseHit('bandpass', 1800, 0.16, 0.30); }              // whoosh
function sfxPop()   { tone('triangle', 320, 640, 0.09, 0.16); }              // head pops up
function sfxLand()  { noiseHit('lowpass', 400, 0.06, 0.18); }                // can hits ground
function sfxGlug(i, n) {                                                     // chug tap — pitch rises as the can empties
  const f = 190 + (i / n) * 310 + rand(-12, 12);
  tone('square', f, f * 0.45, 0.07, 0.20);
  if (i % 3 === 0) noiseHit('highpass', 3200, 0.05, 0.10);                   // fizz
}
function sfxTada() {
  [523, 659, 784, 1047].forEach((f, i) => tone('triangle', f, f, 0.22, 0.28, i * 0.10));
  noiseHit('highpass', 4000, 0.35, 0.15, 0.4);
}
function sfxCount() { tone('square', 392, 392, 0.12, 0.22); }                // ready / set
function sfxGo()    { tone('square', 784, 784, 0.28, 0.28); noiseHit('highpass', 3000, 0.15, 0.12); }

/* ---------------- three.js setup ---------------- */
const canvas = $('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec9ea);
scene.fog = new THREE.Fog(0x8ec9ea, 20, 50);

// Close-in, tilted-down camera so the camp fills a portrait phone screen.
const camera = new THREE.PerspectiveCamera(56, innerWidth / innerHeight, 0.1, 120);
camera.position.set(0, 6.5, 5.8);
camera.lookAt(0, 1.4, -2.6);

function resize() {
  const aspect = innerWidth / innerHeight;
  camera.aspect = aspect;
  camera.fov = aspect < 1 ? 66 : 56;   // portrait gets a taller field of view
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}
resize();
window.addEventListener('resize', resize);

scene.add(new THREE.HemisphereLight(0xffffff, 0x4e7a3a, 0.95));
const sun = new THREE.DirectionalLight(0xfff2cc, 0.85);
sun.position.set(6, 12, 5);
scene.add(sun);

const mat = (color, opts = {}) =>
  new THREE.MeshPhongMaterial(Object.assign({ color, flatShading: true, shininess: 0, specular: 0x111111 }, opts));

/* ---------------- world building ---------------- */
const SPAWNS = [];        // {x, z, coverTop}
const worldAnim = [];     // things to animate gently (clouds)

function addBlobShadow(x, z, r, opacity = 0.3) {
  const m = new THREE.Mesh(
    new THREE.CircleGeometry(r, 10),
    new THREE.MeshBasicMaterial({ color: 0x2e4d24, transparent: true, opacity, depthWrite: false })
  );
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.02, z);
  scene.add(m);
}

function buildGround() {
  const g = new THREE.PlaneGeometry(80, 100, 26, 30);
  const pos = g.attributes.position;
  const colors = [];
  const c1 = new THREE.Color(0x6faa4e), c2 = new THREE.Color(0x5c9440), c3 = new THREE.Color(0x86b75a);
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + rand(-0.35, 0.35));
    pos.setY(i, pos.getY(i) + rand(-0.35, 0.35));
    pos.setZ(i, rand(0, 0.28)); // becomes height after rotation
    const c = pick([c1, c2, c3]);
    colors.push(c.r, c.g, c.b);
  }
  g.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, new THREE.MeshPhongMaterial({
    vertexColors: true, flatShading: true, shininess: 0, specular: 0x111111
  }));
  m.rotation.x = -Math.PI / 2;
  scene.add(m);
}

function buildDomeTent(x, z, color) {
  const geo = new THREE.SphereGeometry(1.55, 7, 5, 0, Math.PI * 2, 0, Math.PI / 2);
  const tent = new THREE.Mesh(geo, mat(color));
  tent.scale.set(1, 0.95, 0.92);
  tent.position.set(x, 0, z);
  scene.add(tent);
  // door
  const door = new THREE.Mesh(new THREE.CircleGeometry(0.52, 6), mat(0x22303c));
  door.position.set(x, 0.5, z + 1.30);
  scene.add(door);
  addBlobShadow(x, z + 0.1, 1.8, 0.22);
  SPAWNS.push({ x: x + rand(-0.2, 0.2), z: z - 1.75, coverTop: 1.45, hideDepth: 2.3 });
}

function buildRidgeTent(x, z, color, rotY = 0) {
  const w = 2.7, d = 2.3, h = 1.65;
  const v = [];
  const A = [-w/2, 0,  d/2], B = [w/2, 0,  d/2], C = [0, h,  d/2];
  const D = [-w/2, 0, -d/2], E = [w/2, 0, -d/2], F = [0, h, -d/2];
  // front, back, left slope, right slope (non-indexed → flat facets)
  v.push(...A, ...B, ...C,  ...E, ...D, ...F);
  v.push(...D, ...A, ...C,  ...D, ...C, ...F);
  v.push(...B, ...E, ...F,  ...B, ...F, ...C);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  geo.computeVertexNormals();
  const tent = new THREE.Mesh(geo, mat(color, { side: THREE.DoubleSide }));
  tent.position.set(x, 0, z);
  tent.rotation.y = rotY;
  scene.add(tent);
  // door (dark triangle on the front face)
  const dg = new THREE.BufferGeometry();
  dg.setAttribute('position', new THREE.Float32BufferAttribute(
    [-0.55, 0, 0, 0.55, 0, 0, 0, 1.1, 0], 3));
  dg.computeVertexNormals();
  const door = new THREE.Mesh(dg, mat(0x22303c, { side: THREE.DoubleSide }));
  door.position.set(x, 0.02, z + d / 2 + 0.02);
  door.rotation.y = rotY;
  scene.add(door);
  addBlobShadow(x, z, 1.9, 0.22);
  SPAWNS.push({ x: x + rand(-0.2, 0.2), z: z - 1.55, coverTop: 1.55, hideDepth: 2.3 });
}

function buildChair(x, z, color, rotY = 0) {
  const g = new THREE.Group();
  const frame = mat(0x3d4852), cloth = mat(color);
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.09, 0.72), cloth);
  seat.position.y = 0.48;
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.75, 0.09), cloth);
  back.position.set(0, 0.88, -0.33); back.rotation.x = -0.16;
  g.add(seat, back);
  [[-0.36, -0.3], [0.36, -0.3], [-0.36, 0.3], [0.36, 0.3]].forEach(([lx, lz]) => {

const easeOutBack = k => { const c1 = 1.70158, c3 = c1 + 1; const p = k - 1; return 1 + c3 * p * p * p + c1 * p * p; };
const easeInQuad  = k => k * k;
const lerp = (a, b, k) => a + (b - a) * k;

const CAN_GREEN = 0x27ae60, CAN_ORANGE = 0xe67e22, CAN_SILVER = 0xd7dde3;
const cans = [];
function makeThrowCan(color) {
  const geo = new THREE.CylinderGeometry(0.17, 0.17, 0.54, 10);
  const silver = mat(CAN_SILVER);

           p0: new THREE.Vector3(), p1: new THREE.Vector3(), mid: new THREE.Vector3(),
           vel: new THREE.Vector3(), spinX: 0, spinZ: 0, targetDude: null, restT: 0 };
}
for (let i = 0; i < 6; i++) cans.push(makeThrowCan(CAN_GREEN));
for (let i = 0; i < 6; i++) cans.push(makeThrowCan(CAN_ORANGE));

function freeCan() {
  let c = cans.find(c => !c.active);
  if (!c) { // reclaim the longest-resting one
    c = cans.filter(c => c.mode === 'rest').sort((a, b) => b.restT - a.restT)[0] || cans[0];
    c.active = false;
  }
  return c;
}

/* ---------------- phase 1: whack-a-mole logic ---------------- */
const P1 = { active: false, score: 0, need: 5, spawnT: 0.4, lastDude: null };
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();

function upCount() { return dudes.filter(d => ['rising', 'up', 'doomed'].includes(d.state)).length; }

function spawnDude() {
  const candidates = dudes.filter(d => d.state === 'down' && d !== P1.lastDude);
  if (!candidates.length) return;
  const d = pick(candidates);
  P1.lastDude = d;
  d.state = 'rising'; d.t = 0;
  d.upTime = rand(1.3, 1.9);
  d.group.visible = true;
  d.group.rotation.set(0, 0, 0);
  d.group.scale.set(1, 1, 1);
  sfxPop();
}

function registerHit(dude, impactPos) {
  if (!P1.active || dude.state === 'hit') return;
  dude.state = 'hit'; dude.t = 0;
  sfxThud();
  splashBurst(impactPos);
  const s = worldToScreen(impactPos);
  floaty(s.x, s.y, pick(CHEERS), 30);
  P1.score++;
  const pip = $('pips').children[P1.score - 1];
  if (pip) pip.classList.add('on');
  if (P1.score >= P1.need) {
    P1.active = false;
    setTimeout(() => { if (game.state === 'phase1') phase1Complete(); }, 550);
  }
}

function throwCan(px, py) {
  ndc.set((px / innerWidth) * 2 - 1, -(py / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);

  // 1) did we aim at a head?
  const heads = dudes.filter(d => ['rising', 'up', 'doomed'].includes(d.state)).map(d => d.hit);
  const headHits = raycaster.intersectObjects(heads, false);

  let target, targetDude = null;
  if (headHits.length) {
    targetDude = headHits[0].object.userData.dude;
    if (targetDude.state === 'up') targetDude.state = 'doomed'; // stays up until the can arrives
    target = new THREE.Vector3();
    targetDude.hit.getWorldPosition(target);
  } else {
    const covHits = raycaster.intersectObjects(COVERS, false);
    if (covHits.length && covHits[0].distance < 40) target = covHits[0].point.clone();
    else target = raycaster.ray.at(20, new THREE.Vector3());
  }

  // launch point: low on screen, slightly toward the tap side (like thrown from your hand)
  const o = new THREE.Vector3(ndc.x * 0.35, -0.78, 0.5).unproject(camera);
  const dir = o.sub(camera.position).normalize();
  const origin = camera.position.clone().addScaledVector(dir, 1.6);

  const c = freeCan();
  const dist = origin.distanceTo(target);
  c.active = true; c.mode = 'fly'; c.t = 0;
  c.dur = clamp(0.26 + dist * 0.014, 0.28, 0.5);
  c.p0.copy(origin);
  c.p1.copy(target);
  c.mid.copy(origin).lerp(target, 0.5);
  c.mid.y += 0.9 + dist * 0.05;                 // arc height
  c.spinX = rand(13, 21) * pick([1, -1]);       // fast end-over-end tumble
  c.spinZ = rand(7, 15) * pick([1, -1]);
  c.targetDude = targetDude;
  c.mesh.visible = true;
  c.mesh.position.copy(origin);
  c.mesh.rotation.set(rand(0, 3), rand(0, 3), rand(0, 3));
  sfxThrow();
}

function canArrived(c) {
  const d = c.targetDude;
  if (d && ['up', 'rising', 'doomed'].includes(d.state)) {
    registerHit(d, c.mesh.position.clone());
    // ricochet off the head
    c.mode = 'drop';
    c.vel.set(rand(-1.5, 1.5), rand(2, 3.5), rand(0.5, 2.5));
  } else {
    c.mode = 'drop';
    c.vel.set(rand(-0.5, 0.5), rand(0.2, 0.8), rand(-0.5, 0.5));
  }
  c.targetDude = null;
}

function updateCans(dt) {
  for (const c of cans) {
    if (!c.active) continue;
    if (c.mode === 'fly') {
      c.t += dt;
      const k = Math.min(c.t / c.dur, 1);
      const a = c.p0.clone().lerp(c.mid, k);
      const b = c.mid.clone().lerp(c.p1, k);
      c.mesh.position.copy(a.lerp(b, k));
      c.mesh.rotation.x += c.spinX * dt;
      c.mesh.rotation.z += c.spinZ * dt;
      if (k >= 1) canArrived(c);
    } else if (c.mode === 'drop') {
      c.vel.y -= 20 * dt;
      c.mesh.position.addScaledVector(c.vel, dt);
      c.mesh.rotation.x += c.spinX * 0.6 * dt;
      c.mesh.rotation.z += c.spinZ * 0.6 * dt;
      if (c.mesh.position.y <= 0.12) {
        c.mesh.position.y = 0.12;
        c.mode = 'rest'; c.restT = 0;
        c.mesh.rotation.set(Math.PI / 2, rand(0, 6.28), 0); // lying on its side
        sfxLand();
      }
    } else if (c.mode === 'rest') {
      c.restT += dt;
      if (c.restT > 5) { c.active = false; c.mesh.visible = false; }
    }
  }
}

function updateDudes(dt, time) {
  for (const d of dudes) {
    if (d.state === 'down') continue;
    d.t += dt;
    const g = d.group;
    if (d.state === 'rising') {
      const k = Math.min(d.t / 0.24, 1);
      g.position.y = lerp(d.hiddenY, d.upY, easeOutBack(k));
      if (k >= 1) { d.state = 'up'; d.t = 0; }
    } else if (d.state === 'up' || d.state === 'doomed') {
      g.rotation.z = Math.sin(time * 4 + d.phase) * 0.07;
      if (d.state === 'up' && d.t > d.upTime) { d.state = 'falling'; d.t = 0; }
    } else if (d.state === 'falling') {
      const k = Math.min(d.t / 0.16, 1);
      g.position.y = lerp(d.upY, d.hiddenY, easeInQuad(k));
      if (k >= 1) { d.state = 'down'; g.visible = false; }
    } else if (d.state === 'hit') {
      const k = Math.min(d.t / 0.42, 1);
      g.rotation.z += 12 * dt;                    // knocked silly
      g.scale.y = lerp(1, 0.7, k);
      g.position.y = lerp(d.upY, d.hiddenY, easeInQuad(k));
      if (k >= 1) { d.state = 'down'; g.visible = false; g.rotation.z = 0; g.scale.y = 1; }
    }
  }
}

function updateSplashes(dt) {
  for (const s of splashes) {
    if (!s.active) continue;
    s.t += dt;
    s.vel.y -= 9.5 * dt;
    s.mesh.position.addScaledVector(s.vel, dt);
    s.mesh.scale.multiplyScalar(1 - 1.6 * dt);
    if (s.t > 0.6 || s.mesh.position.y < 0) { s.active = false; s.mesh.visible = false; }
  }
}

function p1Update(dt, time) {
  if (P1.active && upCount() < 2) {
    P1.spawnT -= dt;
    if (P1.spawnT <= 0) {
      spawnDude();
      P1.spawnT = rand(0.55, 1.0);
    }
  }
  updateDudes(dt, time);
  updateCans(dt);
  updateSplashes(dt);
  worldAnim.forEach((cl, i) => {           // drifting clouds
    cl.position.x += dt * (0.18 + i * 0.07);
    if (cl.position.x > 18) cl.position.x = -18;
  });
}

const EMOJIS = ['🍺', '🍻', '💛', '✨', '🫧', '🥴'];

function spawnEmojis(x, y, n, size = 30) {

}
function updateEmojis(dt) {
  for (const p of pemos) {

    p.life += dt;
    p.vy += 1900 * dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt;

    if (p.life > 0.72) p.el.style.opacity = String(Math.max(0, 1 - (p.life - 0.72) / 0.28));

function clearEmojis() { pemos.forEach(p => { p.active = false; p.el.style.display = 'none'; }); }

function chugTap(x, y) {
  P2.taps++;
  P2.level = Math.max(0, 1 - P2.taps / P2.need);
  sfxGlug(P2.taps, P2.need);
  spawnEmojis(x, y, 2 + Math.floor(P2.taps / 8), 26 + P2.taps * 0.6);  // bursts grow

  squishTimer = setTimeout(() => canWrap.classList.remove('squish'), 90);
  // milestones + crowd chants
  if (P2.taps === 15) floaty(innerWidth / 2, innerHeight * 0.42, 'HALFWAY! 🍻', 42);
  else if (P2.taps === 25) floaty(innerWidth / 2, innerHeight * 0.42, 'LAST DROPS! 💨', 42);
  else if (P2.taps % 4 === 0 && P2.taps < P2.need)
    floaty(rand(50, innerWidth - 50), innerHeight * rand(0.55, 0.8), pick(CHANTS), rand(22, 34));
  // it gets frantic near the bottom
  if (P2.taps >= 24) {
    const c = $('chug');
    c.classList.remove('shake');
    void c.offsetWidth;
    c.classList.add('shake');
  }
  if (P2.taps >= P2.need) chugDone();
}

function chugDone() {
  P2.done = true;
  P2.finalTime = (performance.now() - P2.t0) / 1000;
  timerEl.textContent = P2.finalTime.toFixed(2);
  $('chugHint').classList.add('hidden');
  // climax: crush the can
  spawnEmojis(innerWidth / 2, innerHeight * 0.5, 14, 42);
  floaty(innerWidth / 2, innerHeight * 0.33, 'BUUUND! 🍻', 54);
  canSvg.style.transition = 'transform .16s cubic-bezier(.3,2,.5,1)';
  canSvg.style.transform = 'scaleY(.58) scaleX(1.12) rotate(-5deg)';
  sfxThud();
  sfxTada();
  const id = game.runId;
  setTimeout(() => { if (game.runId === id) showResult(); }, 950);
}

function showResult() {
  game.state = 'result';
  const ms = Math.round(P2.finalTime * 1000);
  const prev = getBest();
  $('rTime').textContent = P2.finalTime.toFixed(2) + 's';
  if (prev !== null) {
    $('rRecordLine').textContent = 'Previous record: ' + (prev / 1000).toFixed(2) + 's';
    if (ms < prev) { $('rNew').classList.remove('hidden'); setBest(ms); }
    else $('rNew').classList.add('hidden');
  } else {
    $('rRecordLine').textContent = 'First chug — record set! 🎉';
    $('rNew').classList.add('hidden');
    setBest(ms);
  }
  $('result').classList.remove('hidden');
}

/* ---------------- game flow ---------------- */
const game = { state: 'welcome', runId: 0 };
const bannerEl = $('banner');

function showBanner(text, sub, dur, cb) {
  $('bannerText').textContent = text;
  $('bannerSub').textContent = sub || '';
  bannerEl.classList.remove('hidden');
  const id = game.runId;
  setTimeout(() => {
    if (game.runId !== id) return;
    bannerEl.classList.add('hidden');
    if (cb) cb();
  }, dur);
}

function buildPips() {
  const pips = $('pips');
  pips.innerHTML = '';
  for (let i = 0; i < P1.need; i++) {
    const s = document.createElement('span');
    s.className = 'pip';
    s.textContent = '🍺';
    pips.appendChild(s);
  }
}

function resetWorldActors() {
  dudes.forEach(d => {
    d.state = 'down'; d.t = 0;
    d.group.visible = false;
    d.group.rotation.set(0, 0, 0);
    d.group.scale.set(1, 1, 1);
    d.group.position.y = d.hiddenY;
  });
  cans.forEach(c => { c.active = false; c.mode = 'idle'; c.mesh.visible = false; });
  splashes.forEach(s => { s.active = false; s.mesh.visible = false; });
}

function startPhase1() {
  game.state = 'phase1';
  P1.active = false; P1.score = 0; P1.spawnT = 0.35; P1.lastDude = null;
  resetWorldActors();
  buildPips();
  music.pause(); music.currentTime = 0;       // music belongs to phase 2 only
  $('chug').classList.add('hidden');
  $('result').classList.add('hidden');
  $('hud').classList.remove('hidden');
  clearEmojis();
  showBanner('Time to hand out beer! 🍺', 'Tap the campers as they pop up!', 1900,
    () => { P1.active = true; });
}

function phase1Complete() {
  game.state = 'transition';
  showBanner('CAMP SERVED! 🍻', '', 900, startPhase2);
}

function startPhase2() {
  game.state = 'phase2';
  $('hud').classList.add('hidden');
  $('chug').classList.remove('hidden');
  $('chugHint').classList.remove('hidden');
  P2.running = false; P2.done = false; P2.taps = 0;
  P2.level = 1; P2.displayLevel = 1;
  P2.best = getBest();
  setFluid(1);
  setGhost(0);
  canSvg.style.transition = '';
  canSvg.style.transform = '';
  $('chug').classList.remove('shake');
  timerEl.textContent = '0.00';
  timerEl.style.color = '#fff';
  if (P2.best !== null) {
    $('paceLine').textContent = 'BEAT ' + (P2.best / 1000).toFixed(2) + 's 🏆';
    $('ghost').setAttribute('opacity', '1');
  } else {
    $('paceLine').textContent = 'SET THE FIRST CAMP RECORD!';
    $('ghost').setAttribute('opacity', '0');
  }
  showBanner('BEND THE KNEE NOW', '', 1200, () => {
    sfxCount();
    showBanner('KLAR…', '', 600, () => {
      sfxCount();
      showBanner('PARAT…', '', 600, () => {
        sfxGo();
        music.currentTime = 0;
        music.play().catch(() => {});    // the song drops exactly on BUND
        P2.running = true;               // timer starts exactly on BUND
        P2.t0 = performance.now();
        showBanner('BUND! 🍺', '', 500);
      });
    });
  });
}

function restartGame() {
  game.runId++;
  music.pause();
  startPhase1();
}

/* ---------------- input ---------------- */
$('welcome').addEventListener('pointerdown', () => {
  if (game.state !== 'welcome') return;
  audioInit();
  $('welcome').classList.add('hidden');
  startPhase1();
});
$('btnRetry').addEventListener('pointerup', e => {   // pointerup: survives the global touchend blocker below
  e.stopPropagation();
  restartGame();
});
window.addEventListener('pointerdown', e => {
  if (game.state === 'phase1' && P1.active) throwCan(e.clientX, e.clientY);
  else if (game.state === 'phase2' && P2.running && !P2.done) chugTap(e.clientX, e.clientY);
});
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());
// iOS Safari ignores user-scalable=no — block double-tap and pinch zoom explicitly,
// otherwise frantic chug-tapping zooms the page and cuts off the UI
document.addEventListener('touchend', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());
['gesturestart', 'gesturechange', 'gestureend'].forEach(t =>
  document.addEventListener(t, e => e.preventDefault(), { passive: false }));

/* ---------------- main loop ---------------- */
const clock = new THREE.Clock();
function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.elapsedTime;
  const s = game.state;
  if (s === 'welcome' || s === 'phase1' || s === 'transition') {
    p1Update(dt, time);
    renderer.render(scene, camera);
  } else if (s === 'phase2' || s === 'result') {
    if (P2.running) {
      P2.displayLevel += (P2.level - P2.displayLevel) * Math.min(1, dt * 14);
      setFluid(P2.displayLevel);
      if (!P2.done) {
        // the can tips back like you're actually chugging it
        canSvg.style.transform = `rotate(${(-(1 - P2.displayLevel) * 22).toFixed(2)}deg)`;
        const el = (performance.now() - P2.t0) / 1000;
        timerEl.textContent = el.toFixed(2);
        if (P2.best !== null) {
          const bestS = P2.best / 1000;
          setGhost(el / bestS);
          timerEl.style.color = P2.taps >= 5
            ? (el <= bestS * (P2.taps / P2.need) ? '#8dffb0' : '#ffb3ab')  // ahead / behind record pace
            : '#fff';
        }
      }
    }
    updateEmojis(dt);
  }
}
buildPips();
setFluid(1);
loop();
</script>
</body>
</html>
